// Detect sharp, sustained stick movements (rolls/flips) in a full flight log and
// build a normalized response window per event, reusing the edge-detection idea
// from Camada 3 but tuned for mixed-amplitude maneuvers in free flight.
function detectFFManeuvers(sp,gyro,time,windowMs=120){
  const N=sp.length;
  const diffs=[]; for(let i=1;i<Math.min(time.length,3000);i++){const d=time[i]-time[i-1]; if(d>0) diffs.push(d);}
  diffs.sort((a,b)=>a-b);
  const dt=diffs.length?diffs[Math.floor(diffs.length/2)]:0.001;
  const wSamples=Math.min(Math.round(windowMs/1000/dt),Math.floor(N*0.05));
  if(wSamples<6) return[];
  const slewW=Math.max(2,Math.round(0.01/dt));
  const spAbs=sp.map(Math.abs);
  const sorted=[...spAbs].filter(v=>v>0).sort((a,b)=>a-b);
  const big=sorted.length?sorted[Math.floor(sorted.length*0.85)]:50;
  const thresh=Math.max(big*0.5,80);
  const events=[]; let lastEdge=-wSamples;
  for(let i=slewW;i<N-wSamples;i++){
    const before=Math.abs(sp[i-slewW]), now=Math.abs(sp[i]);
    if(before<thresh*0.3 && now>=thresh && i-lastEdge>=wSamples){
      events.push(i); lastEdge=i;
    }
  }
  if(!events.length) return[];
  const windows=[];
  for(const e of events){
    const spLevel=sp[e]; if(Math.abs(spLevel)<thresh*0.3) continue;
    const sign=spLevel>=0?1:-1;
    const win=new Array(wSamples);
    for(let k=0;k<wSamples;k++) win[k]=(gyro[e+k]||0)*sign/Math.abs(spLevel)*100;
    const spWin=new Array(wSamples);
    for(let k=0;k<wSamples;k++) spWin[k]=(sp[e+k]||0)*sign/Math.abs(spLevel)*100;
    windows.push({win,spWin});
  }
  if(!windows.length) return[];
  const mean=new Array(wSamples).fill(0), spMean=new Array(wSamples).fill(0), tAxis=[];
  for(let k=0;k<wSamples;k++){
    let s=0,sp2=0; for(const w of windows){s+=w.win[k]; sp2+=w.spWin[k];}
    mean[k]=parseFloat((s/windows.length).toFixed(2));
    spMean[k]=parseFloat((sp2/windows.length).toFixed(2));
    tAxis.push(parseFloat((k*dt*1000).toFixed(1)));
  }
  return[{mean,spMean,tAxis,count:windows.length,dt}];
}
// Classic FF signature: at the very start of the move (first ~10-15 ms) the
// gyro should already be tracking a meaningful fraction of the setpoint
// (FF pushes the motors ahead of the error). Too little FF → sluggish start
// (low initial tracking, "laggy" feel). Too much FF → a sharp spike right at
// the edge that decays back down before the rest of the loop (P/D) settles in.
function evalFFSignature(mean,spMean,tAxis){
  const idxAt=ms=>{ for(let i=0;i<tAxis.length;i++) if(tAxis[i]>=ms) return i; return tAxis.length-1; };
  const i10=idxAt(10), i20=idxAt(20), i40=idxAt(40), iEarlyEnd=idxAt(25);
  const initialTrack=mean[i10]; // % of setpoint already reached at ~10ms
  let earlyPeak=-Infinity; for(let i=0;i<=iEarlyEnd;i++) if(mean[i]>earlyPeak) earlyPeak=mean[i];
  const settleRef=mean[i40];
  const spike=Math.max(0,earlyPeak-Math.max(settleRef,100));
  return{initialTrack:parseFloat(initialTrack.toFixed(1)), spike:parseFloat(spike.toFixed(1)), settleRef:parseFloat(settleRef.toFixed(1))};
}

async function loadFFLog(input){
  if(!input.files.length) return;
  const file=input.files[0];
  if(!/\.csv$/i.test(file.name)){alert('Carregue um .csv exportado do Blackbox Explorer.');input.value='';return;}
  try{
    S.ffFlightLog=parseCsvText(await readText(file),file.name);
    document.getElementById('ff-log-name').textContent='✅ '+file.name;
    document.getElementById('btn-ff').disabled=false;
  }catch(e){alert('Erro ao ler CSV: '+e.message);}
  input.value='';
}

function analisarFF(){
  const d=S.ffFlightLog;
  if(!d) return;
  const rollWin=detectFFManeuvers(d.spx,d.gx,d.time,120)[0];
  const pitchWin=detectFFManeuvers(d.spy,d.gy,d.time,120)[0];
  if(!rollWin && !pitchWin){
    alert('Não foram encontradas manobras rápidas suficientes (rolls/flips) neste log. Grave um voo com entradas de stick mais bruscas e completas.');
    return;
  }
  document.getElementById('result-ff').style.display='block';
  const scales={x:{title:{display:true,text:'Tempo desde a entrada (ms)'}},y:{title:{display:true,text:'Resposta (%)'},min:-20,max:200}};

  function paintAxis(win,canvasId,color,label){
    if(!win){ const c=document.getElementById(canvasId); if(c) c.parentElement.innerHTML='<div style="font-size:.78rem;color:var(--muted);padding:20px">Sem manobras suficientes neste eixo.</div>'; return null; }
    mkChart(canvasId,{type:'line',data:{labels:win.tAxis,datasets:[
      {label:'Setpoint (normalizado)',data:win.spMean,borderColor:'#5c6472',borderDash:[5,4],pointRadius:0,borderWidth:1.5},
      {label:label,data:win.mean,borderColor:color,pointRadius:0,tension:.25,borderWidth:2.5}
    ]},options:{scales}});
    return evalFFSignature(win.mean,win.spMean,win.tAxis);
  }
  const rollSig=paintAxis(rollWin,'chartFFRoll','#4f9dff',`Giroscópio Roll (${rollWin?.count||0} manobras)`);
  const pitchSig=paintAxis(pitchWin,'chartFFPitch','#ff6b5c',`Giroscópio Pitch (${pitchWin?.count||0} manobras)`);

  // ── Classification thresholds (heuristic, consistent with the rest of the tool)
  const LOW_TRACK=18, HIGH_SPIKE=14;
  function classify(sig){
    if(!sig) return null;
    if(sig.spike>HIGH_SPIKE) return{status:'high', delta:-Math.min(0.35, sig.spike*0.012)};
    if(sig.initialTrack<LOW_TRACK) return{status:'low', delta:Math.min(0.35,(LOW_TRACK-sig.initialTrack)*0.012)};
    return{status:'ok', delta:0};
  }
  const rollC=classify(rollSig), pitchC=classify(pitchSig);
  const deltas=[rollC,pitchC].filter(Boolean).map(c=>c.delta);
  const avgDelta=deltas.length?deltas.reduce((a,b)=>a+b,0)/deltas.length:0;
  const current=S.sliders.ffGains;
  const suggested=Math.max(0,Math.min(2,parseFloat((current+avgDelta).toFixed(2))));
  const anyHigh=[rollC,pitchC].some(c=>c&&c.status==='high');
  const anyLow=[rollC,pitchC].some(c=>c&&c.status==='low');
  let verdict, alClass;
  if(!anyHigh&&!anyLow){verdict='✅ Feed Forward parece adequado nos dois eixos — boa relação entre rastreamento inicial e ausência de spike.'; alClass='al-s';}
  else if(anyHigh&&!anyLow){verdict='🔻 Spike logo após a entrada de stick detectado — sinal de Feed Forward alto demais. Sugerida redução.'; alClass='al-w';}
  else if(anyLow&&!anyHigh){verdict='🔺 Rastreamento inicial baixo (resposta "atrasada" ao stick) — sinal de Feed Forward baixo demais. Sugerido aumento.'; alClass='al-w';}
  else {verdict='⚠️ Comportamento misto entre eixos (um pede mais, outro pede menos) — ajuste com cautela e valide com novo voo.'; alClass='al-w';}

  function axisLine(label,sig,c){
    if(!sig) return `<tr><td>${label}</td><td colspan="3" style="color:var(--muted)">sem dados</td></tr>`;
    const statusLbl={ok:'🟢 Adequado',high:'🔻 FF alto',low:'🔺 FF baixo'}[c.status];
    return `<tr><td>${label}</td><td>${sig.initialTrack}%</td><td>${sig.spike}%</td><td>${statusLbl}</td></tr>`;
  }
  document.getElementById('ff-report').innerHTML=`
    <div class="al ${alClass}">${verdict}</div>
    <table><thead><tr><th>Eixo</th><th>Rastreamento ~10ms</th><th>Spike inicial</th><th>Diagnóstico</th></tr></thead>
    <tbody>${axisLine('Roll',rollSig,rollC)}${axisLine('Pitch',pitchSig,pitchC)}</tbody></table>
    <div style="margin-top:8px;font-size:.8rem;color:var(--muted)">
      FF atual: <strong style="color:var(--accent)">${current.toFixed(2)}</strong> ·
      FF sugerido: <strong style="color:${suggested===current?'var(--green)':'var(--yellow)'}">${suggested.toFixed(2)}</strong>
    </div>`;
  S.ffAnalysis={rollSig,pitchSig,suggested,current};
}

}

                <span id="lt-label" style="font-weight:700">—</span>
              </div>
              <div style="background:var(--track);border-radius:2px;height:10px;overflow:hidden;position:relative;">
                <div style="position:absolute;left:0;top:0;height:100%;width:60%;background:var(--green);opacity:.18;"></div>
                <div style="position:absolute;left:60%;top:0;height:100%;width:25%;background:var(--yellow);opacity:.18;"></div>
                <div style="position:absolute;left:85%;top:0;height:100%;width:15%;background:var(--red);opacity:.18;"></div>
                <div id="lt-bar" style="height:100%;width:0%;border-radius:4px;transition:width .25s,background .25s;"></div>
              </div>
            </div>
            <table style="font-size:.73rem;border-collapse:collapse;min-width:220px;">
              <thead><tr>
                <th style="padding:3px 8px;color:var(--muted);text-align:left;border-bottom:1px solid var(--border)">Zona</th>
                <th style="padding:3px 8px;color:var(--muted);text-align:center;border-bottom:1px solid var(--border)">%</th>
                <th style="padding:3px 8px;color:var(--muted);text-align:center;border-bottom:1px solid var(--border)">Atual</th>
              </tr></thead>
              <tbody>
                <tr id="lt-row-safe"><td style="padding:3px 8px;color:var(--green)">🟢 Seguro</td><td style="padding:3px 8px;text-align:center">0–59%</td><td id="lt-here-safe" style="padding:3px 8px;text-align:center"></td></tr>
                <tr id="lt-row-warn"><td style="padding:3px 8px;color:var(--yellow)">🟡 Atenção</td><td style="padding:3px 8px;text-align:center">60–84%</td><td id="lt-here-warn" style="padding:3px 8px;text-align:center"></td></tr>
                <tr id="lt-row-danger"><td style="padding:3px 8px;color:var(--red)">🔴 Risco Alto</td><td style="padding:3px 8px;text-align:center">85–100%</td><td id="lt-here-danger" style="padding:3px 8px;text-align:center"></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
    </div>
  </div>
  <div class="btn-row"><button class="btn btn-o" onclick="go(2)">← Filtros</button><button class="btn btn-p" onclick="go(4)">Avançar → Feed Forward</button></div>
  </div>
</section>

<section id="s4" class="step">
  <div class="card"><div class="ctitle">Camada 4 — Feed Forward (voo completo: rolls e flips)</div>
  <div class="inst"><strong>Procedimento:</strong> com D Max, I Gains e a relação P-D já definidos na Camada 3, esta etapa ajusta apenas o <strong>Feed Forward</strong>. Primeiro aplicamos uma sugestão inicial, depois você grava um voo completo com diversos rolls e flips (entradas rápidas de stick) e o sistema compara o quão bem o giroscópio acompanha o setpoint no instante da entrada.</div>

  <div class="ctitle" style="font-size:.92rem">Passo 1 — Sugestão inicial de Feed Forward</div>
  <div id="ff-initial-box"></div>
  <button class="btn btn-p btn-full" onclick="suggestFFInitial()">🧭 Sugerir valor inicial de Feed Forward</button>

  <hr>
  <div class="ctitle" style="font-size:.92rem">Passo 2 — Log do voo completo</div>
  <div class="dz"><input type="file" accept=".csv,.CSV" onchange="loadFFLog(this)">
    <div class="dz-txt">Carregar log do voo (rolls + flips)</div><div class="dz-hint">.csv exportado do Blackbox Explorer · voo completo, não apenas steps isolados</div></div>
  <div id="ff-log-name" style="font-size:.78rem;color:var(--muted);margin-top:6px">Nenhum arquivo</div>
  <button id="btn-ff" class="btn btn-p btn-full" disabled onclick="analisarFF()">🪂 Analisar resposta de Feed Forward</button>

  <div id="result-ff" style="display:none;margin-top:16px">
    <div class="g2">
      <div><div class="ctop">Roll — manobra representativa</div><div class="cbox"><canvas id="chartFFRoll"></canvas></div></div>
      <div><div class="ctop">Pitch — manobra representativa</div><div class="cbox"><canvas id="chartFFPitch"></canvas></div></div>
    </div>
    <div id="ff-report" style="margin-top:14px"></div>

    <hr>
    <div class="ctitle" style="font-size:.92rem">Passo 3 — Confirmação</div>
    <p style="font-size:.78rem;color:var(--muted);margin-bottom:10px">Com base na análise acima, confirme o valor de Feed Forward ou aplique o ajuste sugerido. Depois de aplicar no Betaflight, regrave um voo semelhante e repita a análise para validar.</p>
    <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:10px">
      <div class="sl-block" style="flex:1;min-width:240px;margin-bottom:0">
        <div class="sl-hdr"><span class="sl-name">Feed Forward Gains (atual)</span><span class="sl-val" id="ff_slider_v">${S.sliders.ffGains.toFixed(2)}</span></div>
        <input type="range" id="ff_slider" min="0" max="2" step="0.05" value="${S.sliders.ffGains}" oninput="updFFSlider(this)">
      </div>
      <button class="btn btn-p" onclick="confirmFF(false)">✅ Confirmar valor atual</button>
      <button class="btn btn-o" onclick="confirmFF(true)">🎯 Aplicar ajuste sugerido</button>
    </div>
    <div id="ff-confirm-banner" class="al" style="display:none"></div>
  </div>

  <hr>
  <div class="ctitle" style="font-size:.92rem">Notas individuais — fatores importantes no tuning</div>
  <div id="ff-notes"></div>

  <div class="btn-row"><button class="btn btn-o" onclick="go(3)">← Step P-D</button></div>
  </div>
</section>`;
  renderFFNotes();
  if(S.ffSuggested) renderFFInitialBox();
}

buildNav(); build(); go(1); loadDroneFromStorage();
</script>
</body>
</html>
